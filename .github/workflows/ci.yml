name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          pip install ruff mypy \
            pydantic>=2.13.4 sqlalchemy>=2.0.51 fastapi>=0.139.2 httpx

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: MyPy
        run: |
          mypy api-gateway/src ingestion/src rag-engine/src vector-store/src \
            --ignore-missing-imports

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: ESLint
        working-directory: dashboard
        run: |
          npm ci --prefer-offline
          npx eslint src/ --ext .ts,.tsx --max-warnings 0

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          pip install pytest pytest-asyncio pytest-cov \
            fastapi>=0.139.2 httpx pydantic>=2.13.4 "pydantic-settings>=2.14.2" \
            "sqlalchemy[asyncio]>=2.0.51" asyncpg python-dotenv \
            "PyJWT[crypto]>=2.13.0" redis \
            weaviate-client qdrant-client
          # pydantic-settings and asyncpg were previously missing here even
          # though api-gateway/src/config.py (BaseSettings) and the Phase 2
          # db/session.py (create_async_engine against a postgresql+asyncpg
          # URL) both need them at import time — without them, any test
          # importing src.config or src.db.session fails to *collect*,
          # which fails the whole pytest run, not just the affected tests.
          # Same reasoning applies to weaviate-client/qdrant-client below
          # (needed by tests/unit/test_weaviate_schema.py, which imports
          # scripts/setup_weaviate_schema.py and weaviate.classes.config
          # directly, with no ImportError guard at test-module scope).
          #
          # PyJWT replaces python-jose here: python-jose has had no
          # meaningful release in years and depends on the still-unpatched
          # `ecdsa` package (timing side-channel); api-gateway/src/
          # middleware/auth.py is written against PyJWT's PyJWKClient.

      - name: Run unit tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql+asyncpg://pvh:pvh_local@localhost:5432/pvh
          REDIS_URL: redis://localhost:6379/0
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: dev-root-token
          AUTH_ENABLED: "false"
        run: |
          pytest tests/unit/ -v \
            --cov=api-gateway/src \
            --cov-report=xml \
            --cov-fail-under=60 \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pvh
          POSTGRES_PASSWORD: pvh_local
          POSTGRES_DB: pvh
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          pip install pytest pytest-asyncio pytest-cov \
            fastapi>=0.139.2 httpx pydantic>=2.13.4 "pydantic-settings>=2.14.2" \
            "sqlalchemy[asyncio]>=2.0.51" asyncpg \
            alembic>=1.18.5 "PyJWT[crypto]>=2.13.0" redis aiokafka \
            python-dotenv

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://pvh:pvh_local@localhost:5432/pvh
        run: cd api-gateway && python -m alembic upgrade head

      - name: Create RLS test role (non-superuser, exercises RLS policies)
        env:
          PGPASSWORD: pvh_local
        run: |
          # POSTGRES_USER=pvh above is the initdb bootstrap superuser --
          # it bypasses RLS unconditionally (rolsuper=true), regardless
          # of FORCE ROW LEVEL SECURITY. Testing isolation against it
          # would either always skip or produce false failures; neither
          # actually proves the policy works. This role is a plain,
          # non-superuser, NOBYPASSRLS login used only by
          # test_rls_isolation*.py to get a real, non-bypassing signal.
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          psql -h localhost -U pvh -d pvh -v ON_ERROR_STOP=1 <<'SQL'
            DO $$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'pvh_rls_test') THEN
                CREATE ROLE pvh_rls_test LOGIN PASSWORD 'pvh_rls_test'
                  NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;
              END IF;
            END
            $$;
            GRANT CONNECT ON DATABASE pvh TO pvh_rls_test;
            GRANT USAGE ON SCHEMA public TO pvh_rls_test;
            GRANT SELECT, INSERT, UPDATE, DELETE ON tenants, users, patients,
              ingestion_jobs, documents, api_keys, audit_logs, query_logs
              TO pvh_rls_test;
            -- Deliberately NOT granting EXECUTE on resolve_api_key_tenant()
            -- here: test_rls_isolation_core_tables.py's
            -- TestApiKeyResolverFailsClosed asserts the ADR-010 fail-closed
            -- default (zero rows OR permission-denied), which is exactly
            -- what an ungranted EXECUTE produces. Granting it here would
            -- test the wrong thing.
          SQL

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://pvh:pvh_local@localhost:5432/pvh
          RLS_TEST_DATABASE_URL: postgresql+asyncpg://pvh_rls_test:pvh_rls_test@localhost:5432/pvh
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          pytest tests/integration/ -v -m integration --tb=short -q

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t pvh-api:${{ github.sha }} api-gateway/

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pvh-api:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          format: table

      - name: Build ingestion image
        run: docker build -t pvh-ingestion:${{ github.sha }} ingestion/

      - name: Trivy scan ingestion
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pvh-ingestion:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          format: table
